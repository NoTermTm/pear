host = "127.0.0.1"
port = 8080
root = "./dist"
spa_fallback = true
keep_alive_timeout_secs = 5
keep_alive_max = 100
max_events = 256
max_connections = 4096
max_request_size = 1048576

[[proxy]]
prefix = "/api"
target = "http://127.0.0.1:3000"

[[proxy]]
prefix = "/upload"
target = "http://127.0.0.1:4000"

[[proxy]]
prefix = "/secure-api"
target = "https://api.example.com"
