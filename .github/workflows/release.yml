name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  HOMEBREW_TAP_REPOSITORY: ${{ github.repository_owner }}/homebrew-tap
  HOMEBREW_FORMULA: pear.rb

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: pear
            archive: pear-linux-x86_64.tar.gz

          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: pear.exe
            archive: pear-windows-x86_64.zip

          - name: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            binary: pear
            archive: pear-macos-x86_64.tar.gz

          - name: macos-aarch64
            os: macos-15
            target: aarch64-apple-darwin
            binary: pear
            archive: pear-macos-aarch64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/
          cp README.md config.example.toml dist/
          tar -C dist -czf "${{ matrix.archive }}" .

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/
          Copy-Item README.md, config.example.toml dist/
          Compress-Archive -Path dist/* -DestinationPath "${{ matrix.archive }}" -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  brew:
    name: Sync Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

    steps:
      - name: Skip when Homebrew token is not configured
        if: env.HOMEBREW_TAP_TOKEN == ''
        run: |
          echo "HOMEBREW_TAP_TOKEN is not configured, skipping Homebrew sync"
          exit 0

      - name: Download Artifacts
        if: env.HOMEBREW_TAP_TOKEN != ''
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Checkout Homebrew Tap
        if: env.HOMEBREW_TAP_TOKEN != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ env.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Formula
        if: env.HOMEBREW_TAP_TOKEN != ''
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          cd homebrew-tap

          VERSION="${TAG_NAME#v}"
          ARM_ARCHIVE="pear-macos-aarch64.tar.gz"
          INTEL_ARCHIVE="pear-macos-x86_64.tar.gz"
          ARM_URL="https://github.com/${REPO}/releases/download/${TAG_NAME}/${ARM_ARCHIVE}"
          INTEL_URL="https://github.com/${REPO}/releases/download/${TAG_NAME}/${INTEL_ARCHIVE}"
          FORMULA_PATH="${HOMEBREW_FORMULA}"

          test -f "../release/${ARM_ARCHIVE}"
          test -f "../release/${INTEL_ARCHIVE}"

          SHA256_ARM="$(sha256sum "../release/${ARM_ARCHIVE}" | awk '{print $1}')"
          SHA256_INTEL="$(sha256sum "../release/${INTEL_ARCHIVE}" | awk '{print $1}')"

          ruby - "${FORMULA_PATH}" "${VERSION}" "${ARM_URL}" "${SHA256_ARM}" "${INTEL_URL}" "${SHA256_INTEL}" <<'RUBY'
          formula_path, version, arm_url, arm_sha, intel_url, intel_sha = ARGV
          class_name = File.basename(formula_path, ".rb").split(/[_-]/).map(&:capitalize).join

          text =
            if File.exist?(formula_path)
              File.read(formula_path)
            else
              <<~FORMULA
                class #{class_name} < Formula
                  desc "Small Rust static file server for frontend build output"
                  homepage "https://github.com/#{ENV.fetch("REPO")}"
                  version "#{version}"

                  on_macos do
                    if Hardware::CPU.arm?
                      url "#{arm_url}"
                      sha256 "#{arm_sha}"
                    else
                      url "#{intel_url}"
                      sha256 "#{intel_sha}"
                    end
                  end

                  def install
                    bin.install "pear"
                  end
                end
              FORMULA
            end

          text.sub!(/version\s+"[^"]+"/, %(version "#{version}"))

          if text.include?('Hardware::CPU.arm?')
            text.sub!(/url\s+"[^"]*pear-macos-aarch64\.tar\.gz"/, %(url "#{arm_url}"))
            text.sub!(/sha256\s+"[0-9a-f]{64}"/, %(sha256 "#{arm_sha}"))
            text.sub!(/url\s+"[^"]*pear-macos-x86_64\.tar\.gz"/, %(url "#{intel_url}"))
            text.sub!(/sha256\s+"[0-9a-f]{64}"/, %(sha256 "#{intel_sha}"))
          else
            raise "Unsupported formula structure in #{formula_path}"
          end

          File.write(formula_path, text)
          RUBY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${FORMULA_PATH}"
          if git diff --cached --quiet; then
            echo "No Homebrew formula changes to commit"
            exit 0
          fi

          git commit -m "Update pear to ${TAG_NAME}"
          git push origin HEAD:main
